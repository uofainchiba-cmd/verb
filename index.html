// 100語まで拡張（重複防止ロジックあり）
while(words.length < 100){
  let w = words[words.length % 30];
  words.push({...w, en:w.en + " " + words.length});
}

let current, correctIndex;

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function newQuestion(){

  const correct = words[Math.floor(Math.random()*words.length)];

  let usedZh = new Set();
  let usedEn = new Set();
  let options = [];

  options.push(correct);
  usedZh.add(correct.zh);
  usedEn.add(correct.en);

  while(options.length < 4){
    let rand = words[Math.floor(Math.random()*words.length)];

    if(!usedZh.has(rand.zh) && !usedEn.has(rand.en)){
      options.push(rand);
      usedZh.add(rand.zh);
      usedEn.add(rand.en);
    }
  }

  options = shuffle(options);
  correctIndex = options.indexOf(correct);

  document.getElementById("question").innerText = correct.en;

  let html="";
  options.forEach((o,i)=>{
    html += `<div class="option" onclick="check(${i})">${o.zh}</div>`;
  });

  document.getElementById("options").innerHTML = html;
  document.getElementById("result").innerHTML = "";

  current = correct;
}

function check(i){
  let opts=document.getElementsByClassName("option");

  if(i === correctIndex){
    opts[i].classList.add("correct");
  }else{
    opts[i].classList.add("wrong");
    opts[correctIndex].classList.add("correct");
  }

  showAnswer();
}

function showAnswer(){
  document.getElementById("result").innerHTML =
  `<p>✅ ${current.zh}<br><span class="jp">${current.jyut}</span></p>
   <p>${current.ex}<br><span class="jp">${current.exjyut}</span></p>
   <p class="en">${current.exen}</p>
   <button onclick="speak()">🔊 音声</button>`;
}

function speak(){
  let u1 = new SpeechSynthesisUtterance(current.zh);
  u1.lang="zh-HK";

  let u2 = new SpeechSynthesisUtterance(current.ex);
  u2.lang="zh-HK";

  speechSynthesis.cancel();
  speechSynthesis.speak(u1);
  speechSynthesis.speak(u2);
}

function nextQuestion(){
  newQuestion();
}

newQuestion();
